<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>yt-agent Architecture</title>
    <script src="https://unpkg.com/cytoscape@3.29.2/dist/cytoscape.min.js"></script>
    <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
    <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #f8fafc;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        overflow: hidden;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── Top bar ── */
      #topbar {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 0;
        padding: 0 20px;
        height: 52px;
        background: rgba(255, 255, 255, 0.97);
        border-bottom: 1px solid #e2e8f0;
        z-index: 20;
      }

      #topbar h1 {
        color: #0f172a;
        font-size: 0.95rem;
        font-weight: 700;
        white-space: nowrap;
        padding-right: 20px;
        border-right: 1px solid #e2e8f0;
        margin-right: 12px;
      }

      /* Tabs */
      #tabs {
        display: flex;
        gap: 2px;
        flex: 1;
      }

      .tab {
        background: transparent;
        border: none;
        color: #94a3b8;
        padding: 6px 14px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.82rem;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: background 0.15s, color 0.15s;
        white-space: nowrap;
      }

      .tab:hover { background: #f1f5f9; color: #475569; }

      .tab.active {
        background: #e2e8f0;
        color: #0f172a;
        border: 1px solid #cbd5e1;
      }

      .tab-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      /* Controls */
      #controls {
        display: flex;
        gap: 4px;
        padding-left: 16px;
        border-left: 1px solid #e2e8f0;
        margin-left: 8px;
      }

      #controls button {
        background: transparent;
        border: 1px solid #e2e8f0;
        color: #64748b;
        padding: 4px 10px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 0.78rem;
        transition: background 0.15s, color 0.15s;
      }

      #controls button:hover { background: #f1f5f9; color: #475569; border-color: #cbd5e1; }

      /* ── Canvas ── */
      #cy { flex: 1; width: 100%; }

      /* ── Legend ── */
      #legend {
        position: fixed;
        bottom: 16px;
        left: 16px;
        z-index: 20;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        padding: 10px 14px;
      }

      .legend-title {
        font-size: 0.65rem;
        color: #94a3b8;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 7px;
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 0.74rem;
        color: #64748b;
        margin-bottom: 4px;
      }

      .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

      /* ── Tooltip ── */
      #tooltip {
        position: fixed;
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 0.78rem;
        color: #475569;
        max-width: 300px;
        line-height: 1.55;
        z-index: 30;
        display: none;
        pointer-events: none;
        white-space: pre-line;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      }

      #tooltip strong {
        display: block;
        color: #0f172a;
        font-size: 0.82rem;
        margin-bottom: 6px;
        padding-bottom: 6px;
        border-bottom: 1px solid #e2e8f0;
      }

      /* ── Hint ── */
      #hint {
        position: fixed;
        bottom: 16px;
        right: 16px;
        color: #cbd5e1;
        font-size: 0.7rem;
        text-align: right;
        line-height: 1.7;
        z-index: 20;
      }

      /* ── View label ── */
      #view-label {
        position: fixed;
        top: 68px;
        right: 16px;
        color: #cbd5e1;
        font-size: 0.7rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        z-index: 20;
      }
    </style>
  </head>
  <body>
    <div id="topbar">
      <h1>yt-agent</h1>

      <div id="tabs">
        <button class="tab active" data-view="overview">
          <span class="tab-dot" style="background:#475569"></span> Overview
        </button>
        <button class="tab" data-view="publish">
          <span class="tab-dot" style="background:#3b82f6"></span> publish
        </button>
        <button class="tab" data-view="enhance">
          <span class="tab-dot" style="background:#8b5cf6"></span> enhance
        </button>
        <button class="tab" data-view="auth">
          <span class="tab-dot" style="background:#10b981"></span> auth
        </button>
        <button class="tab" data-view="infra">
          <span class="tab-dot" style="background:#f97316"></span> Infrastructure
        </button>
      </div>

      <div id="controls">
        <button id="btn-zoomin">＋</button>
        <button id="btn-zoomout">－</button>
        <button id="btn-fit">Fit</button>
      </div>
    </div>

    <div id="view-label"></div>

    <div id="legend">
      <div class="legend-title">Layers</div>
      <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>CLI</div>
      <div class="legend-item"><div class="legend-dot" style="background:#8b5cf6"></div>Orchestrator</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>SEO</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f97316"></div>LLM</div>
      <div class="legend-item"><div class="legend-dot" style="background:#14b8a6"></div>Tools</div>
      <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>Auth</div>
      <div class="legend-item"><div class="legend-dot" style="background:#6b7280"></div>Config</div>
      <div class="legend-item"><div class="legend-dot" style="background:#374151"></div>External</div>
    </div>

    <div id="tooltip"></div>
    <div id="hint">Scroll · Drag to pan · Click node for details</div>

    <div id="cy"></div>

    <script>
      cytoscape.use(cytoscapeDagre);

      // ── Node definitions ──────────────────────────────────────────────────
      const NODE_DEFS = {
        // CLI layer
        CMD_PUBLISH: {
          label: 'publish\n./video.mp4',
          group: 'cli',
          title: 'yt-agent publish',
          info: 'Uploads a new video end-to-end.\nFlags: --thumbnail, --playlist, --no-transcribe\nFlow: download → transcribe → SEO → review → upload\ncli.py → run_publish_workflow()',
        },
        CMD_ENHANCE: {
          label: 'enhance\n--recent / --video',
          group: 'cli',
          title: 'yt-agent enhance',
          info: 'Updates metadata of a published video.\nNo re-upload needed.\nFlags: --recent N, --video ID, --playlist ID, --dry-run\ncli.py → run_enhance_workflow()',
        },
        CMD_AUTH: {
          label: 'auth\nyoutube · drive',
          group: 'cli',
          title: 'yt-agent auth',
          info: 'Runs OAuth 2.0 flow for YouTube or Drive.\nDelegates to OAuthManager (auth/oauth.py).\nTokens saved to:\n~/.config/yt-agent/credentials/youtube_token.json\n~/.config/yt-agent/credentials/drive_token.json',
        },
        CMD_OTHER: {
          label: 'optimize · transcribe\nschedule · playlists',
          group: 'cli',
          title: 'Other CLI commands',
          info: 'optimize — Generate SEO without uploading\ntranscribe — Standalone audio transcription\nschedule — Show next publish time\nplaylists — List YouTube playlists',
        },

        // Orchestrator layer (agent/)
        PUB_WF: {
          label: 'run_publish\n_workflow()',
          group: 'orch',
          title: 'run_publish_workflow()',
          info: 'Full publish orchestration.\nFile: agent/orchestrator.py\n1. Detect Drive URL → download\n2. Transcribe with word timestamps\n3. Generate chapter markers\n4. SEO optimize → build PublishPlan (agent/models.py)\n5. Display via presenter.display_publish_plan()\n6. execute_plan() on approval',
        },
        ENH_WF: {
          label: 'run_enhance\n_workflow()',
          group: 'orch',
          title: 'run_enhance_workflow()',
          info: 'Enhancement orchestration.\nFile: agent/orchestrator.py\n1. Fetch video(s) from YouTube\n2. SEO enhance for each video\n3. Display via presenter.display_enhancement_comparison()\n4. Interactive review loop\n5. Apply updates on approval',
        },
        REVIEW: {
          label: 'Review Loop\napprove / edit / cancel',
          group: 'orch',
          title: 'Interactive Review Loop',
          info: 'File: agent/orchestrator.py\nDisplay is delegated to agent/presenter.py:\n  display_publish_plan()\n  display_enhancement_comparison()\n  display_enhance_plan_summary()\nUser choices: approve / edit / cancel\nFor "edit": inline editor for title & tags',
        },
        EXEC: {
          label: 'execute_plan()\nupdate_metadata()',
          group: 'orch',
          title: 'execute_plan() / update_metadata()',
          info: 'File: agent/orchestrator.py\nPublish: delegates to YouTubeVideoManager\n  (upload + set_thumbnail + add_to_playlist)\nEnhance: patches video snippet via\n  YouTubeTool.update_metadata() — no re-upload.',
        },
        AGENT_MODELS: {
          label: 'agent/models.py\nPublishPlan · EnhancePlan',
          group: 'orch',
          title: 'agent/models.py — Data Models',
          info: 'Pure data classes, no display logic.\nPublishPlan: video_source, metadata, publish_time,\n  playlist_id, thumbnail_path\nVideoEnhancement: original + enhanced metadata\nEnhancePlan: list of VideoEnhancement\nAll display is in agent/presenter.py',
        },

        // SEO layer
        OPT: {
          label: 'optimize()\nnew video metadata',
          group: 'seo',
          title: 'SEOOptimizer.optimize()',
          info: 'Generates metadata for a new video.\nPrompt: SEO_OPTIMIZATION_PROMPT\nInput: topic + transcript + context\nOutput JSON: title, description, tags, hashtags\nLanguage: Arabic Egyptian + English tech terms',
        },
        ENH_OP: {
          label: 'enhance()\nexisting metadata',
          group: 'seo',
          title: 'SEOOptimizer.enhance()',
          info: 'Improves metadata of a published video.\nPrompt: SEO_ENHANCEMENT_PROMPT\nInput: current title/description/tags + view_count\nOutput JSON: enhanced fields + changes_summary',
        },
        CHAP: {
          label: 'generate_chapters()\nfrom word timestamps',
          group: 'seo',
          title: 'SEOOptimizer.generate_chapters()',
          info: 'Generates YouTube chapter markers.\nPrompt: CHAPTER_GENERATION_PROMPT\nInput: [{word, start_time, end_time}] + duration\nOutput: [{time: "MM:SS", title: "..."}]\nOnly for videos > 60s. First chapter = 0:00',
        },

        // Tools layer
        YT: {
          label: 'YouTubeTool\ntools/youtube/',
          group: 'tools',
          title: 'YouTubeTool (facade)',
          info: 'File: tools/youtube/__init__.py\nThin facade composing four focused managers:\n  _video.py  → YouTubeVideoManager\n    upload_video, set_thumbnail,\n    update_metadata, get_video_details\n  _playlist.py → YouTubePlaylistManager\n    list_playlists, add_to_playlist,\n    list_playlist_videos\n  _channel.py → YouTubeChannelManager\n    get_channel_info, list_channel_videos\n  _models.py → VideoDetails, VideoUploadResult\nAuth: via OAuthManager (auth/oauth.py)',
        },
        DRIVE: {
          label: 'GoogleDriveTool\ndrive.py',
          group: 'tools',
          title: 'GoogleDriveTool',
          info: 'File: tools/drive.py\nGoogle Drive API wrapper.\nAuth: via OAuthManager (auth/oauth.py)\ndownload_video(), get_file_info()\nParses /d/FILE_ID/ and ?id=FILE_ID URLs',
        },
        TRANS: {
          label: 'TranscriptionTool\ntranscribe.py',
          group: 'tools',
          title: 'TranscriptionTool',
          info: 'File: tools/transcribe.py\nGoogle Cloud Speech-to-Text.\nAuth: GOOGLE_APPLICATION_CREDENTIALS\nShort audio (≤ 55s): inline recognize()\nLong audio (> 55s): GCS → long_running_recognize()\nExtracts audio via moviepy (16kHz mono WAV)\nValidates duration > 0 before transcribing',
        },

        // Auth layer
        OAUTH_MGR: {
          label: 'OAuthManager\nauth/oauth.py',
          group: 'auth',
          title: 'OAuthManager',
          info: 'File: auth/oauth.py\nShared OAuth 2.0 credential manager.\nUsed by both YouTubeTool and GoogleDriveTool.\nReplaces ~100 lines of duplicated auth code.\n\nAPI:\n  load_credentials()       — load + auto-refresh token\n  authenticate()           — browser flow, raises AuthError\n  get_valid_credentials()  — load or authenticate\n\nconfig: service_name, scopes, token_filename, port',
        },

        // LLM layer
        FACTORY: {
          label: 'factory.py\ncreate_llm()',
          group: 'llm',
          title: 'LLM Factory',
          info: 'create_llm(provider=None)\nReads default_llm_provider from settings.\nReturns ClaudeLLM or OpenAILLM.\nBoth implement BaseLLM:\n  generate() → LLMResponse\n  generate_json() → dict',
        },
        CLAUDE_LLM: {
          label: 'ClaudeLLM\nclaude-sonnet-4',
          group: 'llm',
          title: 'ClaudeLLM',
          info: 'File: llm/claude.py\nModel: claude-sonnet-4-20250514\nUses AsyncAnthropic client\nDefault LLM provider\nRequires: ANTHROPIC_API_KEY',
        },
        OPENAI_LLM: {
          label: 'OpenAILLM\ngpt-4o',
          group: 'llm',
          title: 'OpenAILLM',
          info: 'File: llm/openai.py\nModel: gpt-4o\nUses AsyncOpenAI client\nAlternative LLM provider\nRequires: OPENAI_API_KEY',
        },

        // Config / cross-cutting
        CONFIG: {
          label: 'config.py\nSettings + ChannelProfile',
          group: 'cfg',
          title: 'config.py',
          info: 'Settings from .env (pydantic-settings):\n  ANTHROPIC_API_KEY, OPENAI_API_KEY\n  GOOGLE_APPLICATION_CREDENTIALS, GCS_BUCKET\nChannelProfile → ~/.config/yt-agent/profile.yaml\n  channel_name, social_links, default_hashtags\n\nexceptions.py — YTAgentError hierarchy:\n  AuthError, UploadError, TranscriptionError,\n  GCSError, DriveError, ConfigurationError',
        },
        PROMPTS: {
          label: 'utils/prompts.py\nSEO · Enhance · Chapters',
          group: 'cfg',
          title: 'utils/prompts.py',
          info: 'All LLM prompt templates:\n• SEO_OPTIMIZATION_PROMPT — new videos\n• SEO_ENHANCEMENT_PROMPT — existing videos\n• CHAPTER_GENERATION_PROMPT — timestamps\nArabic Egyptian + English technical terms\nHardcoded for "DevOps with David" channel specifics',
        },
        SCHED: {
          label: 'utils/scheduler.py\nSat 19:00 Cairo',
          group: 'cfg',
          title: 'utils/scheduler.py',
          info: 'calculate_next_publish_time()\nDefault: Saturday 19:00 Africa/Cairo\nIf target time passed today → schedules next week\nReturns timezone-aware datetime.\nRaises ConfigurationError on invalid HH:MM format.',
        },

        // External APIs
        YT_API: {
          label: 'YouTube\nData API v3',
          group: 'ext',
          title: 'YouTube Data API v3',
          info: 'OAuth scopes: youtube\nvideos.insert, videos.update, videos.list\nplaylistItems.insert, thumbnails.set\nchannels.list, playlists.list',
        },
        DRIVE_API: {
          label: 'Google\nDrive API',
          group: 'ext',
          title: 'Google Drive API',
          info: 'OAuth scope: drive.readonly\nfiles.get, files.export\nDownloads video files by Drive file ID',
        },
        SPEECH: {
          label: 'Google Cloud\nSpeech-to-Text',
          group: 'ext',
          title: 'Google Cloud Speech-to-Text',
          info: 'Service account auth\nrecognize() for short audio (≤ 55s)\nlong_running_recognize() for long audio\nSupports ar-EG with word-level timestamps',
        },
        GCS: {
          label: 'Google Cloud\nStorage (GCS)',
          group: 'ext',
          title: 'Google Cloud Storage',
          info: 'Required for audio > 55 seconds.\nAudio uploaded as WAV before transcription.\nBucket: GCS_BUCKET env var.\nSame service account as Speech-to-Text.\nUpload timeout: 600s (10 minutes).',
        },
        ANTHRO: {
          label: 'Anthropic\nAPI',
          group: 'ext',
          title: 'Anthropic API',
          info: 'Model: claude-sonnet-4-20250514\nAuth: ANTHROPIC_API_KEY\nDefault LLM for all SEO generation',
        },
        OAI: {
          label: 'OpenAI\nAPI',
          group: 'ext',
          title: 'OpenAI API',
          info: 'Model: gpt-4o\nAuth: OPENAI_API_KEY\nAlternative LLM provider',
        },
      };

      // ── All edges ─────────────────────────────────────────────────────────
      const ALL_EDGES = [
        // CLI → workflows
        { source: 'CMD_PUBLISH', target: 'PUB_WF',    label: 'publish flow' },
        { source: 'CMD_ENHANCE', target: 'ENH_WF',    label: 'enhance flow' },
        { source: 'CMD_AUTH',    target: 'YT' },
        { source: 'CMD_AUTH',    target: 'DRIVE' },

        // Publish workflow
        { source: 'PUB_WF', target: 'DRIVE',        label: 'Drive URL?' },
        { source: 'PUB_WF', target: 'TRANS',        label: 'transcribe' },
        { source: 'PUB_WF', target: 'CHAP',         label: 'chapters' },
        { source: 'PUB_WF', target: 'OPT',          label: 'optimize' },
        { source: 'PUB_WF', target: 'AGENT_MODELS', label: 'PublishPlan' },
        { source: 'PUB_WF', target: 'REVIEW' },
        { source: 'REVIEW', target: 'EXEC',          label: 'approved' },
        { source: 'EXEC',   target: 'YT',            label: 'upload' },

        // Enhance workflow
        { source: 'ENH_WF', target: 'YT',           label: 'fetch video(s)' },
        { source: 'ENH_WF', target: 'ENH_OP',       label: 'enhance' },
        { source: 'ENH_WF', target: 'AGENT_MODELS', label: 'EnhancePlan' },
        { source: 'ENH_WF', target: 'REVIEW' },

        // SEO → LLM
        { source: 'OPT',    target: 'FACTORY' },
        { source: 'ENH_OP', target: 'FACTORY' },
        { source: 'CHAP',   target: 'FACTORY' },
        { source: 'FACTORY', target: 'CLAUDE_LLM' },
        { source: 'FACTORY', target: 'OPENAI_LLM' },

        // Tools → Auth → External
        { source: 'YT',         target: 'OAUTH_MGR', label: 'credentials' },
        { source: 'DRIVE',      target: 'OAUTH_MGR', label: 'credentials' },
        { source: 'OAUTH_MGR',  target: 'YT_API' },
        { source: 'OAUTH_MGR',  target: 'DRIVE_API' },
        { source: 'YT',         target: 'YT_API' },
        { source: 'DRIVE',      target: 'DRIVE_API' },
        { source: 'TRANS',      target: 'GCS',    label: 'audio > 55s' },
        { source: 'TRANS',      target: 'SPEECH' },
        { source: 'CLAUDE_LLM', target: 'ANTHRO' },
        { source: 'OPENAI_LLM', target: 'OAI' },

        // Config / cross-cutting (dashed)
        { source: 'CONFIG',  target: 'PUB_WF',      label: 'settings',       dashed: true },
        { source: 'CONFIG',  target: 'OPT',          label: 'channel profile', dashed: true },
        { source: 'PROMPTS', target: 'OPT',          label: 'prompts',         dashed: true },
        { source: 'SCHED',   target: 'EXEC',         label: 'publish time',    dashed: true },
        { source: 'CONFIG',  target: 'ENH_WF',       label: 'settings',        dashed: true },
        { source: 'CONFIG',  target: 'ENH_OP',       label: 'channel profile', dashed: true },
        { source: 'PROMPTS', target: 'ENH_OP',       label: 'prompts',         dashed: true },
      ];

      // ── Views: which nodes to show ────────────────────────────────────────
      const VIEWS = {
        overview: {
          label: 'Full Overview',
          nodes: Object.keys(NODE_DEFS),
        },
        publish: {
          label: 'publish flow',
          nodes: ['CMD_PUBLISH', 'PUB_WF', 'REVIEW', 'EXEC', 'AGENT_MODELS',
                  'DRIVE', 'TRANS', 'OPT', 'CHAP',
                  'FACTORY', 'CLAUDE_LLM', 'OPENAI_LLM',
                  'YT', 'OAUTH_MGR', 'CONFIG', 'PROMPTS', 'SCHED',
                  'YT_API', 'DRIVE_API', 'SPEECH', 'GCS', 'ANTHRO', 'OAI'],
        },
        enhance: {
          label: 'enhance flow',
          nodes: ['CMD_ENHANCE', 'ENH_WF', 'REVIEW', 'EXEC', 'AGENT_MODELS',
                  'ENH_OP', 'FACTORY', 'CLAUDE_LLM', 'OPENAI_LLM',
                  'YT', 'OAUTH_MGR', 'CONFIG', 'PROMPTS',
                  'YT_API', 'ANTHRO', 'OAI'],
        },
        auth: {
          label: 'auth flow',
          nodes: ['CMD_AUTH', 'YT', 'DRIVE', 'OAUTH_MGR', 'CONFIG', 'YT_API', 'DRIVE_API'],
        },
        infra: {
          label: 'Infrastructure',
          nodes: ['YT', 'DRIVE', 'TRANS', 'OAUTH_MGR',
                  'FACTORY', 'CLAUDE_LLM', 'OPENAI_LLM',
                  'CONFIG', 'PROMPTS', 'SCHED',
                  'YT_API', 'DRIVE_API', 'SPEECH', 'GCS', 'ANTHRO', 'OAI'],
        },
      };

      // ── Colors ────────────────────────────────────────────────────────────
      const COLOR = {
        cli:   { bg: '#eff6ff', border: '#3b82f6', text: '#1d4ed8' },
        orch:  { bg: '#f5f3ff', border: '#8b5cf6', text: '#5b21b6' },
        seo:   { bg: '#fffbeb', border: '#f59e0b', text: '#92400e' },
        llm:   { bg: '#fff7ed', border: '#f97316', text: '#9a3412' },
        tools: { bg: '#f0fdfa', border: '#14b8a6', text: '#115e59' },
        auth:  { bg: '#f0fdf4', border: '#10b981', text: '#065f46' },
        cfg:   { bg: '#f8fafc', border: '#94a3b8', text: '#475569' },
        ext:   { bg: '#f1f5f9', border: '#94a3b8', text: '#64748b' },
      };

      // ── Build element list for a view ─────────────────────────────────────
      function buildElements(viewKey) {
        const nodeSet = new Set(VIEWS[viewKey].nodes);

        const nodes = [...nodeSet].map(id => {
          const d = NODE_DEFS[id];
          return { data: { id, label: d.label, group: d.group, title: d.title, info: d.info } };
        });

        const edges = ALL_EDGES
          .filter(e => nodeSet.has(e.source) && nodeSet.has(e.target))
          .map((e, i) => ({
            data: {
              id: `e_${viewKey}_${i}`,
              source: e.source,
              target: e.target,
              label: e.label || '',
              dashed: e.dashed || false,
            },
          }));

        return [...nodes, ...edges];
      }

      // ── Cytoscape instance ────────────────────────────────────────────────
      const cy = cytoscape({
        container: document.getElementById('cy'),
        elements: buildElements('overview'),
        style: [
          {
            selector: 'node',
            style: {
              label: 'data(label)',
              'text-valign': 'center', 'text-halign': 'center',
              'text-wrap': 'wrap', 'text-max-width': '150px',
              'font-size': '10.5px',
              width: '170px', height: '58px',
              shape: 'round-rectangle', 'border-width': '1.5px',
              padding: '10px',
            },
          },
          ...Object.entries(COLOR).map(([group, c]) => ({
            selector: `node[group="${group}"]`,
            style: { 'background-color': c.bg, 'border-color': c.border, color: c.text },
          })),
          {
            selector: 'node.hover',
            style: { 'border-width': '2.5px', 'border-color': '#0f172a' },
          },
          {
            selector: 'edge',
            style: {
              width: 1.4, 'line-color': '#cbd5e1',
              'target-arrow-color': '#cbd5e1', 'target-arrow-shape': 'triangle',
              'arrow-scale': 1, 'curve-style': 'bezier',
              label: 'data(label)', 'font-size': '9px', color: '#94a3b8',
              'text-background-color': '#f8fafc', 'text-background-opacity': 0.9,
              'text-background-padding': '2px', 'text-rotation': 'autorotate',
            },
          },
          {
            selector: 'edge[?dashed]',
            style: {
              'line-style': 'dashed', 'line-dash-pattern': [6, 4],
              'line-color': '#e2e8f0', 'target-arrow-color': '#e2e8f0',
            },
          },
        ],
        layout: {
          name: 'dagre', rankDir: 'TB',
          ranksep: 70, nodesep: 35, padding: 50, animate: false,
        },
        wheelSensitivity: 0.25,
        minZoom: 0.1,
        maxZoom: 3,
      });

      // ── Switch view ───────────────────────────────────────────────────────
      function switchView(viewKey) {
        tooltip.style.display = 'none';
        cy.elements().remove();
        cy.add(buildElements(viewKey));
        cy.layout({
          name: 'dagre', rankDir: 'TB',
          ranksep: 70, nodesep: 35, padding: 50, animate: false,
        }).run();
        cy.fit(undefined, 50);
        document.getElementById('view-label').textContent = VIEWS[viewKey].label;
      }

      // ── Tabs ──────────────────────────────────────────────────────────────
      document.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          btn.classList.add('active');
          switchView(btn.dataset.view);
        });
      });

      // ── Controls ──────────────────────────────────────────────────────────
      const mid = () => ({ x: window.innerWidth / 2, y: window.innerHeight / 2 });
      document.getElementById('btn-zoomin').onclick  = () => cy.zoom({ level: cy.zoom() * 1.3, renderedPosition: mid() });
      document.getElementById('btn-zoomout').onclick = () => cy.zoom({ level: cy.zoom() / 1.3, renderedPosition: mid() });
      document.getElementById('btn-fit').onclick     = () => cy.fit(undefined, 50);

      // ── Tooltip ───────────────────────────────────────────────────────────
      const tooltip = document.getElementById('tooltip');

      cy.on('mouseover', 'node', e => e.target.addClass('hover'));
      cy.on('mouseout',  'node', e => e.target.removeClass('hover'));

      cy.on('tap', 'node', e => {
        const d = e.target.data();
        if (!d.info) return;
        tooltip.innerHTML = `<strong>${d.title}</strong>${d.info}`;
        tooltip.style.display = 'block';
        const rp = e.renderedPosition;
        tooltip.style.left = Math.min(rp.x + 16, window.innerWidth  - 320) + 'px';
        tooltip.style.top  = Math.max(rp.y - 20, 60)                        + 'px';
      });

      cy.on('tap', e => { if (e.target === cy) tooltip.style.display = 'none'; });

      // ── Init ──────────────────────────────────────────────────────────────
      cy.ready(() => {
        cy.fit(undefined, 50);
        document.getElementById('view-label').textContent = VIEWS['overview'].label;
      });
    </script>
  </body>
</html>
